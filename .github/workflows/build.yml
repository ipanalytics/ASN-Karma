name: Build ASN Karma

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Download BlackRoute export archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ipanalytics/BlackRoute/releases/latest \
            -o data/blackroute-release.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("data/blackroute-release.json").read_text())
          matches = [
              asset["browser_download_url"]
              for asset in release.get("assets", [])
              if asset.get("name", "").endswith("_exports.tar.gz")
          ]
          if not matches:
              names = ", ".join(asset.get("name", "") for asset in release.get("assets", []))
              raise SystemExit(f"BlackRoute exports archive not found. Assets: {names}")
          Path("data/blackroute-export-url.txt").write_text(matches[0] + "\n")
          PY
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$(cat data/blackroute-export-url.txt)" \
            -o data/blackroute_exports.tar.gz
          tar -xzf data/blackroute_exports.tar.gz -C data blackroute.jsonl

      - name: Build ASN risk
        run: go run ./cmd/asn-karma -input data/blackroute.jsonl -out release -readme README.md

      - name: Commit README dataset links
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update ASN dataset links"
            git push
          fi

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_number }}
          name: ASN Karma dataset ${{ github.run_number }}
          body_path: release/release-notes.md
          make_latest: true
          files: release/*
