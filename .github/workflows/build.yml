name: Build ASN Karma

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Download BlackRoute export archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ipanalytics/BlackRoute/releases/latest \
            -o data/blackroute-release.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("data/blackroute-release.json").read_text())
          matches = [
              asset["browser_download_url"]
              for asset in release.get("assets", [])
              if asset.get("name", "").endswith("_exports.tar.gz")
          ]
          if not matches:
              names = ", ".join(asset.get("name", "") for asset in release.get("assets", []))
              raise SystemExit(f"BlackRoute exports archive not found. Assets: {names}")
          Path("data/blackroute-export-url.txt").write_text(matches[0] + "\n")
          PY
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$(cat data/blackroute-export-url.txt)" \
            -o data/blackroute_exports.tar.gz
          tar -xzf data/blackroute_exports.tar.gz -C data blackroute.jsonl

      - name: Build ASN risk
        run: go run ./cmd/asn-karma -input data/blackroute.jsonl -out release -readme README.md -cymru-batch 25000 -prefix-limit 100

      - name: Commit README dataset links
        run: |
          if [ -n "$(git status --porcelain README.md data/history/asn_daily.jsonl)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git stash push --include-untracked -m "asn-karma generated dataset state" -- README.md data/history/asn_daily.jsonl
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git stash pop

            if [ -z "$(git status --porcelain README.md data/history/asn_daily.jsonl)" ]; then
              echo "No README/history changes remain after rebase."
              exit 0
            fi

            git add README.md data/history/asn_daily.jsonl
            git commit -m "Update ASN dataset state"

            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push failed; rebasing and retrying (${attempt}/3)."
              git pull --rebase origin "${GITHUB_REF_NAME}"
            done
            git push
          fi

      - name: Validate release artifacts
        run: |
          find release -maxdepth 1 -type f -size 0 -print -quit | grep -q . && {
            echo "Release contains empty artifact(s):"
            find release -maxdepth 1 -type f -size 0 -print
            exit 1
          }
          find release -maxdepth 1 -type f -print -exec wc -c {} \;

      - name: Prepare release metadata
        run: |
          stamp="$(date -u +'%Y-%m-%d-%H%MZ')"
          title="$(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "RELEASE_TAG=asn-karma-${stamp}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=ASN Karma Dataset - ${title}" >> "$GITHUB_ENV"

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: release/release-notes.md
          make_latest: true
          files: |
            release/index.json
            release/asn-risk.jsonl
            release/asn-changes.jsonl
            release/asn-summary.csv
            release/asn-evidence-table.md
            release/asn-profiles.tar.gz
            release/source-impact.csv
            release/country-risk.csv
            release/high-risk-asn-critical.txt
            release/high-risk-asn-high.txt
            release/high-risk-asn-watch.txt
            release/high-risk-asn-prefixes-critical.txt
            release/high-risk-asn-prefixes-high.txt
            release/high-risk-asn-prefixes-watch.txt
            release/report.md
            release/release-notes.md
            release/run_stats.json
            release/checksums.txt
