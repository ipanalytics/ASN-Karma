name: Build ASN Karma

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Download BlackRoute release
        run: |
          mkdir -p data
          curl -fsSL \
            https://github.com/ipanalytics/BlackRoute/releases/latest/download/blackroute.jsonl \
            -o data/blackroute.jsonl

      - name: Build ASN risk
        run: go run ./cmd/asn-karma -input data/blackroute.jsonl -out release -readme README.md

      - name: Commit README dataset links
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update ASN dataset links"
            git push
          fi

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_number }}
          name: ASN Karma dataset ${{ github.run_number }}
          body_path: release/release-notes.md
          make_latest: true
          files: release/*
